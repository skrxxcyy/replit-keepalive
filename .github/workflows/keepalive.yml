name: Replit Keepalive

on:
  schedule:
    # 每15分钟执行一次（UTC时间，远低于Replit 30分钟休眠阈值）
    - cron: '*/15 * * * *'
  workflow_dispatch: # 允许手动触发保活

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Replit Danmu API
        uses: fjogeleit/http-request-action@v1
        with:
          url: 'https://cd48fdfa-9a05-48ec-8ce1-42ae0f8f7a7b-00-p06hkl5snzzo.riker.replit.dev/danmu/api/v2'
          method: 'GET'
          timeout: 10000 # 超时时间10秒，避免卡任务
