name: Replit Keepalive

on:
  schedule:
    # 每15分钟执行一次，低于  Replit 30分钟休眠阈值
    - cron: '*/15 * * * *'
  workflow_dispatch: # 保留手动触发功能

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Replit Danmu API
        uses: fjogeleit/http-request-action@v1
        with:
          url: 'https://cd48fdfa-9a05-48ec-8ce1-42ae0f8f7a7b-00-p06hkl5snzzo.riker.replit.dev/danmu'
          method: 'GET'
          timeout: 10000
